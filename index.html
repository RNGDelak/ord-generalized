<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id = "Title"></title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #textOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .textLabel {
            position: absolute;
            white-space: nowrap;
            user-select: none;
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>
    <div id="textOverlay"></div>


    <script src="https://peterolson.github.io/BigRational.js/BigInt_BigRat.min.js"></script>

    <script src="main.js"></script>

</body>

</html>
